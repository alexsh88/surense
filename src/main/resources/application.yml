spring:
  application:
    name: surense-support-hub

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: BINARY

  flyway:
    enabled: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db

# Application-level JWT config (SecurityConfig reads these)
app:
  jwt:
    access-token-expiry-seconds: 900       # 15 minutes
    refresh-token-expiry-seconds: 1209600  # 14 days
