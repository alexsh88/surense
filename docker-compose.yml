services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: surense
      MYSQL_USER: surense
      MYSQL_PASSWORD: surense
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8081:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/surense
      DB_USERNAME: surense
      DB_PASSWORD: surense
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
